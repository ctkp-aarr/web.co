<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>荒らし共産党</title>
    <!-- Discord Embed Settings -->
    <meta property="og:title" content="WEB Raider" />
    <meta property="og:description" content="WEB Raider - Advanced Tools" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0099ff" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff006e;
            --neon-cyan: #0099ff;
            --neon-purple: #b537f2;
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --darker-bg: #050505;
            --neon-light: #f5f5f5;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes neonGlow {
            0%, 100% {
                text-shadow: 0 0 10px var(--neon-cyan), 
                             0 0 20px var(--neon-cyan),
                             0 0 30px var(--neon-cyan);
            }
            50% {
                text-shadow: 0 0 20px var(--neon-cyan), 
                             0 0 30px var(--neon-cyan),
                             0 0 40px var(--neon-cyan);
            }
        }

        @keyframes borderNeon {
            0%, 100% {
                border-color: var(--neon-cyan);
                box-shadow: 0 0 15px var(--neon-cyan),
                           inset 0 0 15px rgba(0, 245, 255, 0.1);
            }
            50% {
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink),
                           inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
        }

        @keyframes focusNeon {
            0% {
                box-shadow: 0 0 5px var(--neon-cyan),
                           inset 0 0 5px rgba(0, 245, 255, 0.1);
            }
            100% {
                box-shadow: 0 0 15px var(--neon-cyan),
                           0 0 20px var(--neon-purple),
                           inset 0 0 10px rgba(0, 245, 255, 0.1);
            }
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--neon-light);
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 245, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 110, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 245, 255, 0.02),
                    rgba(0, 245, 255, 0.02) 2px,
                    transparent 2px,
                    transparent 4px
                );
            pointer-events: none;
            z-index: 0;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.98; }
        }
        
        .discord-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            border-radius: 0;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5),
                       inset 0 0 10px rgba(0, 245, 255, 0.1);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        
        .discord-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px var(--neon-cyan),
                       0 0 40px var(--neon-pink),
                       inset 0 0 15px rgba(0, 245, 255, 0.2);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        
        .discord-button svg {
            width: 20px;
            height: 20px;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
        }
        
        .container {
            background: rgba(5, 5, 5, 0.95);
            border: 2px solid var(--neon-cyan);
            border-radius: 0;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 20px var(--neon-cyan),
                       0 0 40px rgba(0, 245, 255, 0.2),
                       inset 0 0 20px rgba(0, 245, 255, 0.05);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out,
                      borderNeon 4s ease-in-out infinite;
            z-index: 10;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        h1 {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: var(--neon-cyan);
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeIn 1s ease-out,
                      neonGlow 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            text-align: center;
            color: var(--neon-pink);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 22px;
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        .form-group:nth-child(3) { animation-delay: 0.4s; }
        .form-group:nth-child(4) { animation-delay: 0.5s; }
        .form-group:nth-child(5) { animation-delay: 0.6s; }
        .form-group:nth-child(6) { animation-delay: 0.7s; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--neon-cyan);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        input[type="text"], 
        input[type="number"], 
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--neon-cyan);
            border-radius: 0;
            background: rgba(5, 5, 5, 0.8);
            color: var(--neon-light);
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 245, 255, 0.05);
        }

        input[type="text"]::placeholder, 
        input[type="number"]::placeholder, 
        textarea::placeholder {
            color: rgba(0, 245, 255, 0.4);
        }
        
        input[type="text"]:focus, 
        input[type="number"]:focus, 
        textarea:focus {
            outline: none;
            border-color: var(--neon-pink);
            background: rgba(5, 5, 5, 0.95);
            box-shadow: 0 0 15px var(--neon-pink),
                       0 0 20px rgba(255, 0, 110, 0.2),
                       inset 0 0 10px rgba(255, 0, 110, 0.05);
        }
        
        .token-input {
            margin-bottom: 10px;
        }
        
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .range-container span {
            font-weight: 600;
            min-width: 30px;
            color: var(--neon-pink);
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
        }
        
        input[type="range"] {
            flex: 1;
            height: 2px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            border-radius: 0;
            outline: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--neon-cyan);
            border-radius: 0;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan),
                       0 0 25px rgba(0, 245, 255, 0.5);
            transition: all 0.2s ease;
            border: 1px solid var(--neon-pink);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink),
                       0 0 30px rgba(255, 0, 110, 0.6);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--neon-cyan);
            border-radius: 0;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan),
                       0 0 25px rgba(0, 245, 255, 0.5);
            border: 1px solid var(--neon-pink);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink),
                       0 0 30px rgba(255, 0, 110, 0.6);
        }

        input[type="range"]::-moz-range-track {
            background: transparent;
            border: none;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            margin-bottom: 25px;
        }
        
        button {
            flex: 1;
            padding: 13px 20px;
            border: 2px solid var(--neon-cyan);
            background: rgba(5, 5, 5, 0.9);
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 0;
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        button:hover {
            color: var(--darker-bg);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink),
                       0 0 30px rgba(255, 0, 110, 0.4);
        }

        button:hover::before {
            left: 0;
            background: var(--neon-pink);
        }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: 0 0 5px rgba(0, 245, 255, 0.1);
        }

        button:disabled:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 5px rgba(0, 245, 255, 0.1);
        }
        
        #logs {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-cyan);
            border-top: 2px solid var(--neon-pink);
            border-radius: 0;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-top: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            box-shadow: inset 0 0 15px rgba(0, 245, 255, 0.05);
        }

        #logs div {
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 245, 255, 0.1);
            line-height: 1.4;
        }

        #logs div:last-child {
            border-bottom: none;
        }
        
        #logs .success {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        #logs .error {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                max-width: 100%;
            }

            h1 {
                font-size: 1.8rem;
            }

            label {
                font-size: 0.8rem;
            }

            button {
                font-size: 0.8rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <a href="https://discord.gg/8HK7AQ6WQt" target="_blank" class="discord-button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36" fill="currentColor">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        Discord
    </a>
    
    <div class="container">
        <h1>荒らし共産党</h1>
        <div class="subtitle">≡ made by rg0f ≡</div>
        
        
        <div class="form-group">
            <label for="tokens">Tokens (改行区切り):</label>
            <textarea id="tokens" rows="6" placeholder="Token 1&#10;Token 2&#10;Token 3&#10;..."></textarea>
        </div>
        
        <div class="form-group">
            <label for="serverId">Server ID:</label>
            <input type="text" id="serverId" placeholder="123456789012345678" />
        </div>
        
        <div class="form-group">
            <label for="channelId">Channel ID:</label>
            <input type="text" id="channelId" placeholder="123456789012345678" />
        </div>
        
        <div class="form-group">
            <label for="interval">Send Interval (ms):</label>
            <input type="number" id="interval" value="1000" min="100" />
        </div>
        
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" rows="4" placeholder="Send messages"></textarea>
        </div>
        
        <div class="button-group">
            <button id="startBtn">▶ Run</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
        </div>
        
        <div id="logs"></div>
    </div>

    <script>
        const tokensInput = document.getElementById('tokens');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const logsDiv = document.getElementById('logs');

        function log(msg, isSuccess = false) {
            const now = new Date().toLocaleTimeString();
            const logLine = document.createElement('div');
            logLine.textContent = `[${now}] ${msg}`;
            logLine.className = isSuccess ? 'success' : 'error';
            logLine.style.animation = 'fadeIn 0.3s ease-out forwards';
            
            logsDiv.appendChild(logLine);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        async function sendMessage(token, channelId, message) {
            try {
                const res = await fetch(`https://discord.com/api/v10/channels/${channelId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content: message })
                });
                if (res.ok) {
                    const data = await res.json();
                    log(`${token.slice(0, 10)}... ✓ Sent: "${message}"`, true);
                } else {
                    log(`${token.slice(0, 10)}... ✗ Error: Status ${res.status}`);
                }
            } catch (err) {
                log(`${token.slice(0, 10)}... ✗ ${err.message}`);
            }
        }

        let sendIntervalId = null;

        startBtn.addEventListener('click', () => {
            const tokens = tokensInput.value
                .split('\n')
                .map(t => t.trim())
                .filter(t => t.length > 0);
            
            const channelId = document.getElementById('channelId').value.trim();
            const message = document.getElementById('message').value;
            const intervalMs = parseInt(document.getElementById('interval').value, 10);

            if (tokens.length === 0) {
                alert('⚠ Enter at least one token');
                return;
            }
            if (!channelId) {
                alert('⚠ Enter Channel ID');
                return;
            }
            if (!message) {
                alert('⚠ Enter a message');
                return;
            }
            if (isNaN(intervalMs) || intervalMs < 100) {
                alert('⚠ Interval must be 100ms or more');
                return;
            }

            startBtn.disabled = true;
            stopBtn.disabled = false;
            startBtn.textContent = '▶ Running...';
            
            log(`⚡ Raider activated with ${tokens.length} token(s)...`, true);

            sendIntervalId = setInterval(() => {
                tokens.forEach(token => {
                    sendMessage(token, channelId, message);
                });
            }, intervalMs);
        });

        stopBtn.addEventListener('click', () => {
            if (sendIntervalId) {
                clearInterval(sendIntervalId);
                sendIntervalId = null;
                log('⏹ Raider stopped', true);
                startBtn.disabled = false;
                stopBtn.disabled = true;
                startBtn.textContent = '▶ Run';
            }
        });
    </script>
</body>
</html>
